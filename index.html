<!DOCTYPE html>
<html>
<head>
    <title>Resume Matcher</title>
</head>
<body>

    <h2>Resume Matching System</h2>

    <form id="uploadForm">
        <label>Upload Resume (PDF):</label><br>
        <input type="file" id="resume" required><br><br>

        <label>Upload Job Description (TXT):</label><br>
        <input type="file" id="job" required><br><br>

        <button type="submit">Match Resume</button>
    </form>

    <h3 id="result"></h3>

    <script>
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
    e.preventDefault();  // VERY IMPORTANT

    const formData = new FormData();
    formData.append("resume", document.querySelector('input[name="resume"]').files[0]);
    formData.append("job", document.querySelector('input[name="job"]').files[0]);

    try {
        const response = await fetch("https://ai-resumeparsing-project-6.onrender.com/match", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        document.getElementById("result").innerText = "Match Score: " + data.match_score;

    } catch (error) {
        console.error("ERROR:", error);
    }
});
</script>

</body>
</html>
